name: Mise à jour automatique des horaires

on:
  schedule:
    # Se lance tous les jours à 04:00 UTC (environ 06:00 en France)
    - cron: '0 4 * * *'
  workflow_dispatch: # Permet de le lancer manuellement pour tester

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code du dépôt
      uses: actions/checkout@v3

    - name: Installer Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer les bibliothèques nécessaires
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Exécuter le script de scraping
      run: python subbot.py

    - name: Enregistrer les modifications (Commit & Push)
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add Lignes/*.html
        git diff-index --quiet HEAD || git commit -m "Mise à jour auto des horaires PDF"
        git push